services:
  - type: web
    name: identity-reconciliation
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    disk:
      name: db
      mountPath: /data
      sizeGB: 1
