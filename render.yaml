services:
  - type: web
    name: identity-reconciliation
    runtime: node
    plan: free
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: identity-db
          property: connectionString

  - type: postgres
    name: identity-db
    plan: free
